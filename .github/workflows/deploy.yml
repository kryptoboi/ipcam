name: Deploy AudioCam to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:  # Pozwala na ręczny trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: audiocam

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Dla Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Alternatywnie użyj Workload Identity Federation (bezpieczniejsze):
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          # service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest \
            .

      - name: Push to Container Registry
        run: |
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          sed "s|IMAGE_PLACEHOLDER|gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}|g" \
            deploy/cloudrun.yaml > /tmp/cloudrun-deploy.yaml
          
          gcloud run services replace /tmp/cloudrun-deploy.yaml \
            --region=$REGION \
            --platform=managed \
            --project=$PROJECT_ID

      - name: Allow public access
        run: |
          gcloud run services add-iam-policy-binding $SERVICE_NAME \
            --region=$REGION \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --platform=managed \
            --project=$PROJECT_ID

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --platform=managed \
            --format="value(status.url)" \
            --project=$PROJECT_ID)
          echo "🚀 Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deploy zakończony!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Kamera:** $URL/camera" >> $GITHUB_STEP_SUMMARY
          echo "**Odbiornik:** $URL/receiver" >> $GITHUB_STEP_SUMMARY
